<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GitHub Scout Operator Demo</title>
<style>
  :root{--black:#080e16;--deep:#0f1c2c;--surface:#162840;--border:#2a4560;--amber:#f5b030;--white:#f6f2ed;--body:#d4e6f4;--muted:#a6c4dc;--green:#50d8a0;--blue:#56a8ec}
  *{box-sizing:border-box}
  body{margin:0;background:#000;color:var(--white);font-family:Inter,Avenir Next,Helvetica,Arial,sans-serif}
  .frame{position:relative;width:1080px;height:1920px;overflow:hidden;background:var(--black)}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(1.08) contrast(1.08)}
  .shade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,14,22,.96),rgba(8,14,22,.62) 32%,rgba(8,14,22,.2) 54%,rgba(8,14,22,.82) 82%,rgba(8,14,22,.98)),radial-gradient(circle at 70% 45%,rgba(80,216,160,.18),transparent 34%)}
  .border{position:absolute;inset:42px;border:1px solid rgba(245,176,48,.38)}
  .brand{position:absolute;top:82px;left:78px;right:78px;display:flex;justify-content:space-between;align-items:center;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);font-size:28px}
  .pill{border:1px solid rgba(80,216,160,.5);background:rgba(80,216,160,.14);color:var(--body);padding:12px 17px;font-size:18px}
  .copy{position:absolute;left:78px;right:78px;top:220px}
  .kicker{font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:var(--green);font-size:24px;margin-bottom:26px}
  h1{margin:0;font-family:Georgia,Times New Roman,serif;font-weight:900;text-transform:uppercase;letter-spacing:0;font-size:94px;line-height:.94;max-width:880px}
  h1 em{color:var(--amber);font-style:normal}
  .sub{margin-top:32px;color:var(--body);font-size:38px;line-height:1.22;max-width:800px;font-weight:600}
  .strip{position:absolute;left:78px;right:78px;bottom:282px;display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
  .strip div{background:rgba(15,28,44,.86);padding:26px 18px;text-align:center}
  .strip strong{display:block;font-family:Georgia,Times New Roman,serif;font-size:40px;color:var(--green);line-height:1}
  .strip span{display:block;margin-top:8px;color:var(--muted);font-size:17px;letter-spacing:.1em;text-transform:uppercase;font-weight:900}
  .cta{position:absolute;left:78px;right:78px;bottom:106px;display:flex;justify-content:space-between;gap:26px;align-items:center}
  .button{background:var(--amber);color:var(--black);padding:32px 38px;min-width:430px;text-align:center;font-size:28px;letter-spacing:.14em;text-transform:uppercase;font-weight:950}
  .note{color:var(--muted);text-align:right;font-size:25px;line-height:1.25;font-weight:700}
  .progress{position:absolute;left:0;right:0;bottom:0;height:10px;background:rgba(60,94,122,.55)}
  .progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--green),var(--amber))}
</style>
</head>
<body>
<div class="frame">
  <img class="bg" id="bg" alt="">
  <div class="shade"></div>
  <div class="border"></div>
  <div class="brand"><div>GitHub Scout</div><div class="pill">Operator Demo</div></div>
  <main class="copy">
    <div class="kicker" id="kicker"></div>
    <h1 id="headline"></h1>
    <div class="sub" id="sub"></div>
  </main>
  <section class="strip">
    <div><strong id="s1"></strong><span id="l1"></span></div>
    <div><strong id="s2"></strong><span id="l2"></span></div>
    <div><strong id="s3"></strong><span id="l3"></span></div>
  </section>
  <footer class="cta"><div class="button" id="button"></div><div class="note" id="note"></div></footer>
  <div class="progress"><span id="progress"></span></div>
</div>
<script>
const scenes = [
  {img:"../../ads/operator-shopify-savings-9x16/bg-01-url-savings.png",k:"Step 1",h:"Paste your <em>Shopify URL.</em>",sub:"Scout starts with the storefront, not a generic app directory.",stats:["URL","Input","15","Sources","10","Scans"],button:"Analyze a URL",note:"Operator is built for solo ecommerce teams."},
  {img:"../../ads/operator-shopify-savings-9x16/bg-02-app-bill-audit.png",k:"Step 2",h:"Find where apps <em>drain margin.</em>",sub:"Flag duplicate widgets, expensive plugins, and software categories worth replacing.",stats:["App","Audit","Save","Monthly","Swap","Ideas"],button:"Audit my stack",note:"Less subscription waste. Cleaner decisions."},
  {img:"../../ads/operator-shopify-savings-9x16/bg-03-better-plugins.png",k:"Step 3",h:"Rank better <em>plugins.</em>",sub:"Reviews, bundles, upsells, trust, capture, speed, and checkout tools ranked for fit.",stats:["Better","Widgets","More","Trust","Lift","CRO"],button:"Find better plugins",note:"Choose tools by fit, not marketplace hype."},
  {img:"../../ads/operator-shopify-savings-9x16/bg-06-cut-app-bloat.png",k:"Step 4",h:"Cut bloat. Load <em>faster.</em>",sub:"Spot heavy embeds and old scripts before installing yet another app.",stats:["Fewer","Apps","Faster","Pages","Better","UX"],button:"Scan for bloat",note:"Lower software spend can improve the shopping experience."},
  {img:"../../ads/operator-shopify-savings-9x16/bg-10-url-action-plan.png",k:"Step 5",h:"Get a software <em>action plan.</em>",sub:"Plugin swaps, widget picks, savings ideas, and conversion tips in one practical report.",stats:["URL","Input","Tips","Output","Next","Steps"],button:"Build my plan",note:"Recommendations, not research tabs."}
];
function render(t){
  const total = 45;
  const idx = Math.min(scenes.length - 1, Math.floor(t / (total / scenes.length)));
  const scene = scenes[idx];
  bg.src = scene.img;
  kicker.textContent = scene.k;
  headline.innerHTML = scene.h;
  sub.textContent = scene.sub;
  s1.textContent = scene.stats[0]; l1.textContent = scene.stats[1];
  s2.textContent = scene.stats[2]; l2.textContent = scene.stats[3];
  s3.textContent = scene.stats[4]; l3.textContent = scene.stats[5];
  button.textContent = scene.button;
  note.textContent = scene.note;
  progress.style.width = `${Math.min(100, (t / total) * 100)}%`;
}
window.render = render;
render(Number(new URLSearchParams(location.search).get("t") || 0));
</script>
</body>
</html>
