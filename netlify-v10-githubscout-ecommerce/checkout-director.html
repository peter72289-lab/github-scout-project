<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scout Director Checkout</title>
  <link rel="stylesheet" href="assets/ecommerce.css">
  <style>
    body { background: #080e16; color: #f6f2ed; font-family: Barlow, Arial, sans-serif; min-height: 100vh; display: grid; place-items: center; padding: 28px; }
    main { max-width: 680px; border: 1px solid #2a4560; background: #0f1c2c; padding: 36px; }
    h1 { font-family: Georgia, serif; color: #f5b030; font-size: clamp(38px, 6vw, 64px); line-height: 1; margin: 0 0 18px; }
    p { color: #d4e6f4; line-height: 1.7; font-size: 18px; }
    a { color: #080e16; background: #f5b030; display: inline-block; margin-top: 22px; padding: 14px 20px; text-decoration: none; font-family: ui-monospace, SFMono-Regular, monospace; text-transform: uppercase; letter-spacing: .1em; }
    .secondary { color: #d4e6f4; background: transparent; border: 1px solid #2a4560; }
  </style>
</head>
<body>
  <main>
    <h1>Director Plan</h1>
    <p>Director gives higher-volume ecommerce operators 30 storefront analyses per month across all 15 sources. The live recurring Stripe order form is connected and includes a 14-day first-month money-back guarantee.</p>
    <a id="directorStripeCta" href="#" hidden>Pay With Stripe - Start Director</a>
    <a class="secondary" href="/">Return to Scout</a>
  </main>
  <script src="assets/launch-config.js"></script>
  <script src="assets/launch-analytics.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const directorUrl = window.GITHUB_SCOUT_LAUNCH_CONFIG?.directorCheckoutUrl;
    const cta = document.querySelector('#directorStripeCta');
    if (directorUrl && cta) {
      const link = new URL(directorUrl, window.location.href);
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach((key) => {
        const value = params.get(key) || sessionStorage.getItem(key);
        if (value) link.searchParams.set(key, value);
      });
      cta.href = link.toString();
      cta.hidden = false;
    }
    cta?.addEventListener('click', () => window.githubScoutTrack?.('director_stripe_clicked'));
  </script>
</body>
</html>
