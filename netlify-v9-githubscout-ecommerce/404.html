<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Scout - Page Not Found</title>
  <style>
    :root{--black:#080e16;--deep:#0f1c2c;--border:#2a4560;--amber:#f5b030;--white:#f6f2ed;--body:#d4e6f4;--muted:#a6c4dc;--green:#50d8a0}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 68% 24%,rgba(245,176,48,.16),transparent 32%),var(--black);color:var(--white);font-family:Barlow,Avenir Next,Helvetica,Arial,sans-serif;display:grid;place-items:center;padding:28px}
    main{width:min(720px,100%);border:1px solid var(--border);background:rgba(15,28,44,.94);padding:42px}
    .kicker{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;color:var(--green);letter-spacing:.18em;text-transform:uppercase;font-size:13px;font-weight:800;margin-bottom:14px}
    h1{font-family:Georgia,Times New Roman,serif;font-size:clamp(42px,7vw,76px);line-height:.96;margin:0 0 18px;text-transform:uppercase}
    h1 em{color:var(--amber);font-style:normal}
    p{color:var(--body);font-size:18px;line-height:1.7;margin:0 0 18px}
    .actions{display:flex;gap:14px;flex-wrap:wrap;margin-top:26px}
    a{display:inline-block;text-decoration:none;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;text-transform:uppercase;letter-spacing:.12em;font-size:13px;font-weight:800;padding:14px 18px;border:1px solid var(--border);color:var(--body)}
    a.primary{background:var(--amber);border-color:var(--amber);color:var(--black)}
  </style>
</head>
<body>
  <main>
    <div class="kicker">404</div>
    <h1>This route is <em>off the map.</em></h1>
    <p>The launch pages are still here. Start with the Operator Shopify savings scan or head back to the V9 homepage.</p>
    <div class="actions">
      <a class="primary" href="/operator-shopify-savings.html#capture">Run URL Analyzer</a>
      <a href="/">Back to GitHub Scout</a>
    </div>
  </main>
</body>
</html>
